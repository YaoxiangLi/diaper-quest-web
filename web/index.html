<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
	<meta name="theme-color" content="#241923">
	<title>Diaper Quest: Baby vs. The World</title>
	<style>
		:root {
			color-scheme: dark;
			--plum: #241923;
			--plum-soft: #352431;
			--cream: #fff5df;
			--rose: #c77b91;
			--gold: #e2b866;
			--gold-light: #ffe2a0;
		}
		* { box-sizing: border-box; }
		html, body, #canvas {
			width: 100%;
			height: 100%;
			min-height: 100%;
			margin: 0;
			padding: 0;
			border: 0;
		}
		body {
			overflow: hidden;
			background:
				radial-gradient(circle at 50% 35%, #6c4858 0, #352431 36%, #1a1119 100%);
			touch-action: none;
			overscroll-behavior: none;
		}
		#canvas {
			display: block;
			min-height: 100dvh;
			outline: none;
		}
		#status {
			position: fixed;
			inset: 0;
			z-index: 10;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			gap: clamp(12px, 2.2vh, 22px);
			padding:
				max(18px, env(safe-area-inset-top))
				max(18px, env(safe-area-inset-right))
				max(18px, env(safe-area-inset-bottom))
				max(18px, env(safe-area-inset-left));
			background:
				linear-gradient(140deg, rgba(255, 226, 160, .09), transparent 38%),
				radial-gradient(circle at 50% 25%, #71505f 0, #352431 43%, #1a1119 100%);
			visibility: hidden;
		}
		#status-splash {
			display: block;
			width: min(92vw, 1280px);
			max-width: 100%;
			max-height: min(70vh, 720px);
			object-fit: contain;
			border: 1px solid rgba(255, 226, 160, .5);
			border-radius: clamp(10px, 2vw, 22px);
			box-shadow:
				0 18px 56px rgba(11, 5, 10, .55),
				0 0 0 5px rgba(199, 123, 145, .12);
		}
		#status-splash.show-image--false { display: none; }
		#status-splash.use-filter--false { image-rendering: pixelated; }
		#loading-card {
			width: min(620px, 92vw);
			padding: 14px clamp(18px, 4vw, 30px) 16px;
			border: 1px solid rgba(226, 184, 102, .7);
			border-radius: 16px;
			background: rgba(36, 25, 35, .94);
			box-shadow: 0 10px 30px rgba(8, 3, 8, .35);
			color: var(--cream);
			font-family: "Segoe UI", "Noto Sans SC", system-ui, sans-serif;
			text-align: center;
		}
		#loading-title {
			margin-bottom: 9px;
			color: var(--gold-light);
			font-size: clamp(17px, 2.6vw, 23px);
			letter-spacing: .04em;
		}
		#loading-copy {
			margin-top: 9px;
			color: #dca9b8;
			font-size: clamp(13px, 2vw, 16px);
		}
		#status-progress {
			display: none;
			width: 100%;
			height: 16px;
			overflow: hidden;
			border: 1px solid rgba(255, 226, 160, .72);
			border-radius: 999px;
			background: #1d131c;
		}
		#status-progress::-webkit-progress-bar { background: #1d131c; }
		#status-progress::-webkit-progress-value {
			border-radius: 999px;
			background: linear-gradient(90deg, var(--rose), var(--gold-light));
		}
		#status-progress::-moz-progress-bar {
			border-radius: 999px;
			background: linear-gradient(90deg, var(--rose), var(--gold-light));
		}
		#status-notice {
			display: none;
			max-height: 34vh;
			overflow: auto;
			color: #ffd9df;
			font-size: 15px;
			line-height: 1.45;
			white-space: pre-line;
		}
		@media (orientation: portrait), (max-height: 520px) {
			#status { gap: 10px; }
			#status-splash { max-height: 54vh; }
			#loading-card { padding-block: 11px 12px; }
		}
	</style>
	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>

</head>
<body>
	<canvas id="canvas" tabindex="0">Your browser does not support the canvas tag.</canvas>
	<noscript>This game needs JavaScript enabled.</noscript>
	<div id="status" aria-live="polite">
		<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
		<div id="loading-card">
			<div id="loading-title">Diaper Quest · 尿不湿勇闯世界</div>
			<progress id="status-progress"></progress>
			<div id="loading-copy">Packing the diaper bag… · 正在整理冒险背包……</div>
			<div id="status-notice"></div>
		</div>
	</div>
	<script src="index.js"></script>
	<script>
	const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":true,"fileSizes":{"index.pck":10893760,"index.wasm":37700666},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
	const GODOT_THREADS_ENABLED = false;
	const engine = new Engine(GODOT_CONFIG);

	(() => {
		const overlay = document.getElementById("status");
		const progress = document.getElementById("status-progress");
		const notice = document.getElementById("status-notice");
		const loadingCopy = document.getElementById("loading-copy");
		let initializing = true;

		function show(mode) {
			if (!initializing) return;
			overlay.style.visibility = "visible";
			progress.style.display = mode === "progress" ? "block" : "none";
			notice.style.display = mode === "notice" ? "block" : "none";
			loadingCopy.style.display = mode === "notice" ? "none" : "block";
		}

		function fail(error) {
			console.error(error);
			notice.textContent = error instanceof Error ? error.message : String(error);
			show("notice");
			initializing = false;
		}

		const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
		if (missing.length) {
			fail("This browser is missing features required by the game:\n" + missing.join("\n"));
			return;
		}

		show("progress");
		engine.startGame({
			onProgress(current, total) {
				if (current > 0 && total > 0) {
					progress.value = current;
					progress.max = total;
				} else {
					progress.removeAttribute("value");
					progress.removeAttribute("max");
				}
			},
		}).then(() => {
			initializing = false;
			overlay.remove();
		}, fail);
	})();
	</script>
</body>
</html>
